<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta charset="utf-8">
  <title>Bird Chaser</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <header>
    <h1>Bird Chaser</h1>
    <p class="subtitle">Find likely lifers without exposing your eBird API key.</p>
  </header>

  <main>
    <section id="apikeyScreen" class="panel">
      <div class="stack">
        <h2>Enter your eBird API key</h2>
        <input
          id="apikeyInput"
          type="password"
          placeholder="Paste your eBird API key"
          autocomplete="off"
          spellcheck="false"
        >
        <div class="controls wrap">
          <button onclick="saveKey()">Start App</button>
        </div>
      </div>
    </section>

    <section id="app" class="hidden">
      <section class="panel stack">
        <h2>Life list</h2>
        <p id="lifeListStatus">No cached life list yet.</p>

        <div class="controls wrap">
          <input
            id="lifeFile"
            type="file"
            accept=".csv,text/csv"
            onchange="handleLifeListImport(event)"
          >
          <button class="secondary" onclick="clearLifeListCache()">Clear Cached Life List</button>
          <button class="secondary" onclick="changeKey()">Change API Key</button>
        </div>
      </section>

      <section class="panel stack">
        <h2>Search</h2>

        <div class="controls wrap">
          <label for="searchMode">Mode</label>
          <select id="searchMode" onchange="handleModeChange()">
            <option value="point" selected>Single point</option>
            <option value="route">Route</option>
          </select>

          <label for="radius">Radius</label>
          <select id="radius">
            <option value="10">10 km</option>
            <option value="20" selected>20 km</option>
            <option value="50">50 km</option>
          </select>

          <label for="daysBack">Days back</label>
          <select id="daysBack">
            <option value="1">1 day</option>
            <option value="3">3 days</option>
            <option value="7" selected>7 days</option>
            <option value="14">14 days</option>
            <option value="30">30 days</option>
          </select>

          <label for="sampleSpacing">Route spacing</label>
          <select id="sampleSpacing">
            <option value="5">5 km</option>
            <option value="10" selected>10 km</option>
            <option value="20">20 km</option>
            <option value="30">30 km</option>
          </select>

          <button onclick="findBirds()">Find Lifers</button>
          <button class="secondary" onclick="clearMapPoints()">Clear Map Points</button>
        </div>

        <p id="modeHelp" class="help-text">
          Single point mode: click the map to choose one search point.
        </p>
      </section>

      <section class="panel">
        <div id="map"></div>
      </section>

      <section class="panel stack">
        <div class="controls wrap">
          <strong>Results</strong>
          <span id="resultsSummary" class="meta"></span>
        </div>
        <ul id="results"></ul>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
